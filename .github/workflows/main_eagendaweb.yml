# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - EAgendaWeb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # build Aplicação .NET
      - name: Build with dotnet
        run: dotnet build --configuration Release

      # build database project
      - name: Build database project
        run: dotnet build EAgendaWeb.database/EAgendaWeb.Database.sqlproj --configuration Release

      # publish Aplicação .NET
      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      # Upload Aplicação .NET compilada
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

      # Upload dos artetatos do banco de dados
      - name: Upload database artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: database-dacpac
          path: EAgendaWeb.database/bin/Release/EAgendaWeb.Database.dacpac

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
        # Download do artefato compilado .NET
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

        # Download do artefato compilado database project
      - name: Download database artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: database-dacpac
          path: database        
      
      # Login do repositório na Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D1715637068E42C29269626E427B56F0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_358B2597534845A184FE8A14402C4DCE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D3236753DDEB48C0841576CCED50BE63 }}

      # publicação artefato do database project
      - name: Deploy database schema
        uses: azure/sql-action@v.3
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: database/EAgendaWeb.Database.dacpac
          action: publish
          arguments: /p:BlockOnPossibleDataLoss=true

      # publicação artefato .NET na Azure
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'EAgendaWeb'
          slot-name: 'Production'
          package: .
          